<!DOCTYPE html>
<script>
    if (localStorage.getItem("isLoggedIn") !== "true") {
        window.location.replace("login.html");
    }
</script>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Leads | VetPocket</title>
    <link rel="stylesheet" href="../../assets/css/toast.css">
    <link rel="stylesheet" href="../../assets/css/leads.css">
    <link rel="stylesheet" href="../../assets/adm/adm-dashboard.css?v=1.2">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div id="header-placeholder"></div>

    <main class="container adm-content">
        <div class="header-actions">
            <h1>Gerenciamento de Leads</h1>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button id="btnArquivar" class="btn-save" style="background: #e53e3e; display: none;">
                    <i class="fas fa-archive"></i> Arquivar Selecionados
                </button>
            </div>
        </div>

        <div class="dashboard-stats">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-users"></i></div>
                <div class="stat-info">
                    <span class="stat-label">Total de Leads</span>
                    <h2 id="stat-total">0</h2>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon" style="background: #e6fffa; color: #38b2ac;"><i class="fas fa-home"></i></div>
                <div class="stat-info">
                    <span class="stat-label">Só Homecare</span>
                    <h2 id="stat-homecare">0</h2>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon" style="background: #ebf8ff; color: #3182ce;"><i class="fas fa-hospital"></i>
                </div>
                <div class="stat-info">
                    <span class="stat-label">Clínica Fixa</span>
                    <h2 id="stat-clinica">0</h2>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon" style="background: #fff5f5; color: #e53e3e;"><i class="fas fa-rocket"></i></div>
                <div class="stat-info">
                    <span class="stat-label">Perfil Misto</span>
                    <h2 id="stat-misto">0</h2>
                </div>
            </div>
        </div>

        <div class="table-container">
            <div class="table-responsive">
                <table id="leadsTable">
                    <thead>
                        <tr>
                            <th style="width: 40px;"><input type="checkbox" id="selectAll"></th>
                            <th>Nome</th>
                            <th>E-mail</th>
                            <th>WhatsApp</th>
                            <th class="desktop-only">Perfil</th>
                            <th class="desktop-only">Data de Cadastro</th>
                        </tr>
                    </thead>
                    <tbody id="leads-table-body">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div class="adm-modal" id="modalEdicao">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Detalhes do Lead</h2>
                <button onclick="fecharModal()" class="btn-close">&times;</button>
            </div>
            <div class="modal-body">
                <form id="formEdicaoLead">
                    <input type="hidden" id="modalId">

                    <label>Nome:</label>
                    <input type="text" id="inputNome" class="adm-input">

                    <label>E-mail:</label>
                    <input type="email" id="inputEmail" class="adm-input">

                    <label>WhatsApp (com DDD):</label>
                    <input type="text" id="inputTelefone" class="adm-input" placeholder="Ex: 5511999999999">

                    <label>Perfil de Atendimento:</label>
                    <input type="text" id="inputPerfil" class="adm-input" readonly
                        style="background: #f4f4f4; cursor: not-allowed;">

                    <label>Status Especial:</label>
                    <select id="inputStatusEspecial" class="adm-input"
                        style="background: #fff; border: 1px solid #ddd;">
                        <option value="Nenhum">Nenhum</option>
                        <option value="Vaga Garantida">⭐ Vaga Garantida (Top 10)</option>
                        <option value="Lista de Espera">⏳ Lista de Espera</option>
                        <option value="Usuário Beta">🚀 Usuário Beta (Cobaia)</option>
                    </select>

                    <label>Notas Internas / Feedback:</label>
                    <textarea id="inputNotas" class="adm-input" rows="3"
                        placeholder="Anotações sobre o testador..."></textarea>
                    <p><strong>Cadastrado em:</strong> <span id="modalData"></span></p>

                    <div class="actions">
                        <button type="submit" class="btn-save">Salvar Alterações</button>
                        <a id="btnWhatsapp" href="#" target="_blank" class="btn-whatsapp">
                            <i class="fab fa-whatsapp"></i> Falar no WhatsApp
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/toast.js"></script>
    <script src="../../assets/js/adm/auth.js"></script>
    <script src="../../assets/js/adm/components.js"></script>
    <script src="../../assets/js/adm/leads.js"></script>

    <script>
        async function initAdmin() {
            const placeholder = document.getElementById("header-placeholder");
            const url = "../../assets/components/header-adm.html";

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`Erro ${response.status}: Arquivo não encontrado`);

                const html = await response.text();
                placeholder.innerHTML = html;

                if (typeof setupHeaderInteractions === "function") {
                    setupHeaderInteractions();
                }
            } catch (error) {
                console.error("❌ Falha no carregamento:", error);
                placeholder.innerHTML = `<div style="background:#fee2e2; color:#991b1b; padding:20px; border:1px solid #f87171; margin:20px; border-radius:8px;">
                    <strong>Erro ao carregar o Header:</strong><br>
                    Caminho tentado: <code>${url}</code>
                </div>`;
            }
        }

        initAdmin();
    </script>
</body>

</html>
